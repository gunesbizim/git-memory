version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # tar is forced to ^7.5.11 via package.json overrides (fastembed depends on ^6.2.0
      # but the override prevents tar 6.x from ever installing). Dependabot cannot see
      # npm overrides so it flags the ^6.2.0 range in fastembed's metadata. Safe to ignore.
      - dependency-name: "tar"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
